services:
  calino:
    build:
      context: .
      args:
        - VITE_SITE_URL=${VITE_SITE_URL:-https://calino.io}
        - CALINO_ENABLE_SW=${CALINO_ENABLE_SW:-false}
        - CALINO_GITHUB_REPO=${CALINO_GITHUB_REPO:-ivan-malinovski/Calino}
        - CALINO_CONTACT_EMAIL=${CALINO_CONTACT_EMAIL:-calendar@malinov.ski}
    ports:
      - "8080:8080"
    # Uncomment to enable self-hosted CalDAV account preconfiguration.
    # See docs/SELF_HOSTED_CONFIG.md for setup instructions.
    # volumes:
    #   - ./calino.config.json:/usr/share/nginx/html/calino.config.json:ro
    # ⚠️ All env vars are build-time only (baked into JS by Vite).
    # To change them: update .env, then `docker compose build`.
    # See docs/DOCKER.md for details.
    restart: unless-stopped
    # ⚠️ cap_drop ALL removed — Docker Desktop 4.7.1 (runc v1.0.3) has a bug
    # where it drops capabilities needed by the container init process itself,
    # causing "standard_init_linux.go:228: operation not permitted" crashes.
    # The container is already hardened via no-new-privileges,
    # pids_limit, and mem_limit.
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

services:
  calino:
    build: .
    ports:
      - "8080:8080"
    environment:
      - VITE_SITE_URL=${VITE_SITE_URL:-https://calino.io}
      - CALINO_ENABLE_SW=${CALINO_ENABLE_SW:-false}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

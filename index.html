<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/calino-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf9f7" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; font-src 'self'"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calino" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="description"
      content="An easy, private, local web calendar with CalDAV sync. Your data on your terms."
    />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Calino - Local-First Calendar" />
    <meta property="og:site_name" content="Calino" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:description"
      content="An easy, private, local web calendar with CalDAV sync. Your data on your terms."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_SITE_URL%/" />
    <meta name="twitter:title" content="Calino - Local-First Calendar" />
    <meta
      name="twitter:description"
      content="An easy, private, local web calendar with CalDAV sync. Your data on your terms."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Calino",
        "description": "An easy, private, local web calendar with CalDAV sync. Your data on your terms.",
        "url": "%VITE_SITE_URL%/",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web"
      }
    </script>

    <title>Calino</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present from 404.html
      // and converts it back into the correct url for the SPA router
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

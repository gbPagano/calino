# ── Main context ────────────────────────────────────────────────
# Replaces the default /etc/nginx/nginx.conf in the Docker image.
# Main-context directives (worker_processes, pid, etc.) must go here,
# not in conf.d/ files which are included inside the http {} block.

# user directive omitted — USER nginx in Dockerfile handles this
worker_processes  auto;

# No pid file — container runs as non-root (USER nginx), nothing to manage.
pid  /dev/null;

error_log  /dev/stderr warn;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;

    # ── Gzip ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Open file cache (static assets) ─────────────────────────
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Server blocks ───────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}

# Shared security headers — included in every location block to avoid
# nginx's add_header inheritance gotcha (location-level replaces server-level).
#
# Why include? nginx silently drops parent add_header directives when a child
# block defines its own. Keeping them in one file avoids divergence.
add_header X-Frame-Options        "SAMEORIGIN"                       always;
add_header X-Content-Type-Options  "nosniff"                         always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

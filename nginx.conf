server {
    listen 8080;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Static site — no file uploads. Cap at 1 KB to shrink attack surface.
    client_max_body_size 1k;

    # Logging — minimal for a static SPA
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Security headers (shared file — see nginx-security-headers.conf)
    include /etc/nginx/conf.d/nginx-security-headers.conf;

    # Static assets — long cache, immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/nginx-security-headers.conf;
    }

    # Service worker — no cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        include /etc/nginx/conf.d/nginx-security-headers.conf;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

services:
  caldav-proxy:
    build:
      context: .
    ports:
      - "8081:8081"
    environment:
      # Leave empty to allow any origin, or restrict to your Calino instance(s):
      # - ALLOWED_ORIGINS=https://calendar.example.com
      - PORT=8081
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

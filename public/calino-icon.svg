<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ede8;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(160,130,110,0.22);stop-opacity:1"/>
    </radialGradient>

    <radialGradient id="bloom" cx="25%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,252,248,0.6);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,252,248,0);stop-opacity:1"/>
    </radialGradient>

    <filter id="paper" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.70" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="strokeShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="rgba(100,60,30,0.22)"/>
    </filter>

    <linearGradient id="hanziGrad" x1="0" y1="222" x2="0" y2="782" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#c4a89a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5E52;stop-opacity:1"/>
    </linearGradient>

    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

